  <!-- Door -->
  <rect x="234" y="164" width="44" height="102" rx="8" fill="#0a0e1a"/>
  
  <!-- Wheels -->
  <circle cx="192" cy="352" r="22" fill="#ffffff"/>
  <circle cx="320" cy="352" r="22" fill="#ffffff"/>
  <circle cx="192" cy="352" r="10" fill="#0a0e1a"/>
  <circle cx="320" cy="352" r="10" fill="#0a0e1a"/>
  
  <!-- Rail -->
