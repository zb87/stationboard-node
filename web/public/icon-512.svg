<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0a0e1a"/>
  
  <!-- Train body -->
  <rect x="128" y="138" width="256" height="192" rx="32" fill="#ffffff"/>
  
  <!-- Window row -->
  <rect x="154" y="164" width="75" height="58" rx="10" fill="#0a0e1a"/>
  <rect x="283" y="164" width="75" height="58" rx="10" fill="#0a0e1a"/>
  
  <!-- Red stripe across train body -->
