<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Simplified Tracks -->
  <g opacity="0.8">
    <!-- Rails in SBB Red -->
    <line x1="16" y1="64" x2="27" y2="44" stroke="#eb0000" stroke-width="2.2" stroke-linecap="round" />
    <line x1="48" y1="64" x2="37" y2="44" stroke="#eb0000" stroke-width="2.2" stroke-linecap="round" />
    <!-- Sleepers -->
    <line x1="20" y1="59" x2="44" y2="59" stroke="#4a5270" stroke-width="1.5" opacity="0.6" />
    <line x1="23" y1="52" x2="41" y2="52" stroke="#4a5270" stroke-width="1" opacity="0.5" />
    <line x1="25" y1="46" x2="39" y2="46" stroke="#4a5270" stroke-width="1" opacity="0.4" />
  </g>

  <!-- Train body white base -->
  <path d="M18 48 L20 28 C20 23, 24 19, 32 19 C40 19, 44 23, 44 28 L46 48 Z" fill="#ffffff" stroke="#0a0e1a" stroke-width="1.5" stroke-linejoin="round" />
  
  <!-- Red nose bottom -->
  <path d="M19 43 C19 43, 25 42, 32 42 C39 42, 45 43, 45 43 L46 48 L18 48 Z" fill="#eb0000" />
  <path d="M21 48 L23 51 L41 51 L43 48 Z" fill="#990000" />

  <!-- Windshield -->
  <path d="M22 27 L24 21 C25 20, 27 20, 32 20 C37 20, 39 20, 40 21 L42 27 C42.5 28, 41.5 29, 40 29 L24 29 C22.5 29, 21.5 28, 22 27 Z" fill="#0a0e1b" />

  <!-- Destination display (gold line) -->
  <rect x="26.5" y="21.5" width="11" height="2" rx="0.5" fill="#f59e0b"/>

  <!-- Headlights -->
  <!-- Top Light -->
  <circle cx="32" cy="17" r="1.5" fill="#ffffff"/>
  <!-- Left Bottom Light -->
  <circle cx="22" cy="40" r="2" fill="#ffffff"/>
  <!-- Right Bottom Light -->
  <circle cx="42" cy="40" r="2" fill="#ffffff"/>

  <!-- Swiss Cross (very simplified) -->
  <rect x="30" y="34" width="4" height="4" rx="0.5" fill="#eb0000"/>
  <path d="M32 35 L32 37 M31 36 L33 36" stroke="#ffffff" stroke-width="0.8" stroke-linecap="round"/>
</svg>